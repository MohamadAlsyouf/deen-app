<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no, user-scalable=no, viewport-fit=cover"
    />

    <!-- Primary Meta Tags -->
    <title>Arkan - Your Journey to Islamic Knowledge</title>
    <meta name="title" content="Arkan - Your Journey to Islamic Knowledge" />
    <meta name="description" content="A comprehensive platform to learn and deepen your understanding of Islam. Explore the Quran, learn the 99 Names of Allah, and understand the pillars of Islam and Iman." />
    <meta name="keywords" content="Islam, Quran, Islamic learning, Pillars of Islam, Pillars of Iman, Asma ul Husna, 99 Names of Allah, Muslim education, Deen, Arkan" />
    <meta name="author" content="Arkan" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#1B4332" />
    <meta name="msapplication-navbutton-color" content="#1B4332" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://arkan.app/" />
    <meta property="og:title" content="Arkan - Your Journey to Islamic Knowledge" />
    <meta property="og:description" content="A comprehensive platform to learn and deepen your understanding of Islam. Explore the Quran, learn the 99 Names of Allah, and understand the pillars of Islam and Iman." />
    <meta property="og:image" content="/assets/og-image.png" />
    <meta property="og:site_name" content="Arkan" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://arkan.app/" />
    <meta property="twitter:title" content="Arkan - Your Journey to Islamic Knowledge" />
    <meta property="twitter:description" content="A comprehensive platform to learn and deepen your understanding of Islam. Explore the Quran, learn the 99 Names of Allah, and understand the pillars of Islam and Iman." />
    <meta property="twitter:image" content="/assets/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/icon.png" />

    <!-- Google Fonts - Cormorant Garamond for headings, DM Sans for body, Amiri for Arabic -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Amiri:wght@400;700&display=swap" rel="stylesheet" />

    <style>
      /* Critical: Set full height on html and body for React Native Web scrolling */
      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        -webkit-overflow-scrolling: touch;
      }

      body {
        font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #FAFBFA;
        color: #1A1A1A;
      }

      /* Ensure the app container fills the viewport */
      #root {
        display: flex;
        flex-direction: column;
      }

      /* Enable smooth scrolling and touch-action for scroll containers */
      * {
        box-sizing: border-box;
      }

      /* Fix for React Native Web ScrollView mouse scrolling */
      [data-testid="scrollview"],
      [role="scrollbar"],
      div[style*="overflow"] {
        -webkit-overflow-scrolling: touch;
      }

      /* Arabic text styling */
      .arabic-text {
        font-family: 'Amiri', serif;
        direction: rtl;
      }

      /* Loading state */
      #loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(135deg, #1B4332 0%, #2D6A4F 50%, #40916C 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.4s ease-out;
      }

      #loading-screen.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      .loader-pillars {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 1.5rem;
      }

      .pillars-row {
        display: flex;
        gap: 8px;
        align-items: flex-end;
      }

      .pillar {
        width: 12px;
        height: 60px;
        background-color: #FFFFFF;
        border-radius: 6px 6px 0 0;
        animation: pillarPulse 2s ease-in-out infinite;
      }

      .pillar:nth-child(1) { animation-delay: 0s; }
      .pillar:nth-child(2) { animation-delay: 0.15s; }
      .pillar:nth-child(3) { animation-delay: 0.3s; }
      .pillar:nth-child(4) { animation-delay: 0.45s; }
      .pillar:nth-child(5) { animation-delay: 0.6s; }

      .pillars-base {
        width: 100px;
        height: 8px;
        background-color: #FFFFFF;
        border-radius: 4px;
        margin-top: 4px;
      }

      @keyframes pillarPulse {
        0%, 100% {
          opacity: 1;
          transform: scaleY(1);
        }
        50% {
          opacity: 0.8;
          transform: scaleY(1.05);
        }
      }

      .loader-title {
        color: #FFFFFF;
        font-size: 2.5rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
        letter-spacing: -0.02em;
        text-align: center;
      }

      .loader-arabic {
        font-family: 'Amiri', serif;
        color: #D4A373;
        font-size: 1.8rem;
        margin-bottom: 0.5rem;
        direction: rtl;
      }

      .loader-subtitle {
        color: rgba(255, 255, 255, 0.8);
        font-size: 1rem;
        margin-bottom: 2rem;
        text-align: center;
      }

      .loader-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-top-color: #D4A373;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      @keyframes slideInLeft {
        from {
          opacity: 0;
          transform: translateX(-20px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      /* Audio wave animation for playing indicator */
      @keyframes audioWave {
        0%, 100% {
          height: 8px;
          opacity: 0.6;
        }
        50% {
          height: 20px;
          opacity: 1;
        }
      }

      /* Smooth scrolling */
      html {
        scroll-behavior: smooth;
      }

      /* Selection color */
      ::selection {
        background-color: #2D6A4F;
        color: #FFFFFF;
      }

      /* Focus styles for accessibility */
      :focus-visible {
        outline: 2px solid #D4A373;
        outline-offset: 2px;
      }

      /* Custom scrollbar styling */
      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }

      ::-webkit-scrollbar-track {
        background: #F1F5F3;
        border-radius: 5px;
      }

      ::-webkit-scrollbar-thumb {
        background: linear-gradient(135deg, #1B4332 0%, #2D6A4F 100%);
        border-radius: 5px;
        transition: background 0.3s ease;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: linear-gradient(135deg, #2D6A4F 0%, #40916C 100%);
      }

      /* Firefox scrollbar */
      * {
        scrollbar-width: thin;
        scrollbar-color: #2D6A4F #F1F5F3;
      }

      /* Smooth transitions for all interactive elements */
      button, a, [role="button"], input, textarea, select {
        transition: all 0.2s ease-out;
      }

      /* Better text rendering */
      * {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }
    </style>
  </head>
  <body>
    <!-- Loading Screen -->
    <div id="loading-screen">
      <div class="loader-pillars">
        <div class="pillars-row">
          <div class="pillar"></div>
          <div class="pillar"></div>
          <div class="pillar"></div>
          <div class="pillar"></div>
          <div class="pillar"></div>
        </div>
        <div class="pillars-base"></div>
      </div>
      <p class="loader-arabic">أركان</p>
      <h1 class="loader-title">Arkan</h1>
      <p class="loader-subtitle">Your Journey to Islamic Knowledge</p>
      <div class="loader-spinner"></div>
    </div>

    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <script>
      // Hide loading screen when app is ready
      window.addEventListener('load', function() {
        var loadingScreen = document.getElementById('loading-screen');
        if (loadingScreen) {
          setTimeout(function() {
            loadingScreen.classList.add('fade-out');
            setTimeout(function() {
              loadingScreen.style.display = 'none';
            }, 400);
          }, 800);
        }
      });
    </script>
  </body>
</html>
